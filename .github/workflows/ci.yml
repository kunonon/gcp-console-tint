name: CI

# No push trigger for develop: its commits are already validated by pull_request
# runs (feature PRs, and the release PR whose head IS develop). A develop push run
# would emit a second same-named check run on the release PR's head commit —
# doubling CI cost and flake exposure on the release gate.
on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Lint, typecheck, test, build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          persist-credentials: false

      - name: Set up pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # The checks are independent of each other, so they run as one parallel group
      # (each member becomes a background step with an implicit wait at the end; if one
      # fails, the rest still finish and the job fails at the group boundary). The two
      # browser builds stay sequential inside a single member: they share wxt's build
      # pipeline, and 5s of build time isn't worth probing it for temp-dir races.
      - parallel:
          - name: Lint
            run: pnpm lint

          - name: Type check
            run: pnpm compile

          - name: Test
            run: pnpm test

          - name: Build (Chrome + Firefox)
            run: pnpm build && pnpm build:firefox
