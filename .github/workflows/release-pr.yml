name: Release PR

on:
  push:
    branches: [develop]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: release-pr
  cancel-in-progress: false

jobs:
  release-pr:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Create or update release PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          version="$(jq -r .version package.json)"

          notes="$(gh api "repos/${GITHUB_REPOSITORY}/releases/generate-notes" -f tag_name="v${version}" -f target_commitish=develop --jq .body || true)"

          body="$(printf '%s\n\n---\n\nMerging this PR tags `v%s` and publishes a GitHub Release with the extension zips attached.\nMerge with **Create a merge commit** (the only method allowed on `main`).\n' "$notes" "$version")"

          existing="$(gh pr list --base main --head develop --state open --json number --jq '.[0].number // empty')"

          if [ -n "$existing" ]; then
            gh pr edit "$existing" --title "Release v${version}" --body "$body"
          else
            gh pr create --base main --head develop --title "Release v${version}" --body "$body"
          fi
